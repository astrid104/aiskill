<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NaBi AI 技能課程推薦</title>
  <style>
    :root {
      --primary: #0066cc;
      --primary-light: #e8f0fb;
      --secondary: #f0f4ff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e2e8f0;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #0041a8 0%, #0066cc 60%, #0099e6 100%);
      color: white;
      padding: 28px 32px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,102,204,0.3);
    }
    .header-left h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; }
    .header-left p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    .main-tabs {
      background: white;
      border-bottom: 2px solid var(--border);
      display: flex;
      padding: 0 32px;
    }
    .main-tab {
      padding: 14px 28px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .main-tab:hover { color: var(--primary); }
    .main-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Filter Bar */
    .filter-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }
    .filter-btn {
      padding: 5px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .filter-btn.active-tool { background: #7c3aed; border-color: #7c3aed; color: white; }
    .filter-btn.active-cert { background: #d97706; border-color: #d97706; color: white; }

    /* Sort control */
    .sort-group { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .sort-select {
      padding: 5px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: 0.82rem;
      color: var(--text);
      background: white;
      cursor: pointer;
    }
    .sort-select:focus { outline: none; border-color: var(--primary); }

    .main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }
    .page-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-info-text { font-size: 0.88rem; color: var(--text-muted); }
    .page-info-text strong { color: var(--text); font-weight: 600; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }

    .skill-card {
      background: white;
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: box-shadow 0.2s;
    }
    .skill-card:hover { box-shadow: var(--shadow-lg); }
    .skill-card.low-relevance {
      background: #f9f9f9;
      border-color: #e0e0e0;
      box-shadow: none;
      opacity: 0.7;
      filter: grayscale(100%);
    }
    .skill-card.low-relevance:hover { box-shadow: var(--shadow); opacity: 0.85; }

    .skill-card-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--secondary);
    }
    .skill-card.low-relevance .skill-card-header { background: #f0f0f0; }
    .skill-card-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .skill-index {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--primary); color: white;
      font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .skill-card.low-relevance .skill-index { background: #999; }
    .skill-name { font-size: 1.05rem; font-weight: 700; color: var(--text); flex: 1; }

    /* cnt badge */
    .cnt-badge {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      flex-shrink: 0;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .cnt-badge.cnt-zero { background: #f5f5f5; color: #999; border-color: #e0e0e0; }
    .skill-card.low-relevance .cnt-badge { background: #e8e8e8; color: #999; border-color: #ddd; }

    .type-badge { padding: 2px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; flex-shrink: 0; }
    .type-技能 { background: #dbeafe; color: #1d4ed8; }
    .type-工具 { background: #ede9fe; color: #6d28d9; }
    .type-證照 { background: #fef3c7; color: #92400e; }
    .skill-card.low-relevance .type-技能,
    .skill-card.low-relevance .type-工具,
    .skill-card.low-relevance .type-證照 { background: #e0e0e0; color: #888; }
    .skill-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }

    .no-match-banner {
      padding: 10px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #e8e8e8;
      font-size: 0.78rem;
      color: #999;
      display: flex; align-items: center; gap: 6px;
    }

    .test-section {
      padding: 10px 20px;
      background: #fffbf0;
      border-bottom: 1px solid #fde68a;
      display: flex; align-items: center; gap: 10px;
    }
    .test-section.test-low { opacity: 0.45; filter: grayscale(100%); }
    .skill-card.low-relevance .test-section { background: #f5f5f5; border-bottom-color: #e8e8e8; }
    .test-label {
      font-size: 0.7rem; font-weight: 700;
      color: #92400e; background: #fef3c7;
      border: 1px solid #fde68a; border-radius: 10px;
      padding: 2px 8px; flex-shrink: 0;
    }
    .skill-card.low-relevance .test-label { background: #e8e8e8; border-color: #ddd; color: #999; }
    .test-title { font-size: 0.8rem; color: var(--text); flex: 1; line-height: 1.4; }
    .test-score { font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }

    .course-list { padding: 8px 0; }
    .course-row {
      display: flex; align-items: center;
      padding: 9px 20px; gap: 12px;
      border-bottom: 1px solid #f8f9fa;
      transition: background 0.1s;
    }
    .course-row:last-child { border-bottom: none; }
    .course-row:hover { background: #f8faff; }
    .skill-card.low-relevance .course-row:hover { background: #f5f5f5; }
    .course-row.course-low { opacity: 0.45; filter: grayscale(100%); }
    .course-row.course-low:hover { opacity: 0.6; }

    .course-rank { width: 20px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-align: center; flex-shrink: 0; }
    .rank-1 { color: #f59e0b; }
    .rank-2 { color: #9ca3af; }
    .rank-3 { color: #cd7c3b; }
    .course-title { flex: 1; font-size: 0.82rem; color: var(--text); line-height: 1.4; word-break: break-all; }

    .score-bar-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; width: 110px; }
    .score-bar-bg { flex: 1; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; }
    .score-val { font-size: 0.75rem; font-weight: 600; width: 40px; text-align: right; flex-shrink: 0; }

    .pagination-wrap { margin-top: 32px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .pg-btn {
      min-width: 38px; height: 38px; border-radius: 8px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--text);
      display: flex; align-items: center; justify-content: center; padding: 0 10px;
      transition: all 0.15s;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .pg-btn.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: 700; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pg-btn.pg-prev, .pg-btn.pg-next { padding: 0 16px; font-size: 0.82rem; }

    /* TAB 2: Jobcat */
    .jc-layout { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }
    .jc-cls3-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .jc-cls3-btn {
      padding: 7px 18px; border-radius: 20px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; font-size: 0.82rem; font-weight: 500;
      color: var(--text-muted); transition: all 0.15s;
    }
    .jc-cls3-btn:hover { border-color: var(--primary); color: var(--primary); }
    .jc-cls3-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

    .jc-cls2-group {
      background: white; border-radius: 14px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      margin-bottom: 20px; overflow: hidden;
    }
    .jc-cls2-header {
      padding: 14px 20px; background: var(--secondary);
      border-bottom: 1px solid var(--border);
      font-size: 1rem; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .jc-cls2-count {
      font-size: 0.75rem; font-weight: 500;
      color: var(--text-muted); background: #e2e8f0;
      padding: 2px 10px; border-radius: 12px;
    }
    .jc-table { width: 100%; border-collapse: collapse; }
    .jc-table th {
      text-align: left; padding: 10px 20px;
      font-size: 0.75rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.03em; border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }
    .jc-table td {
      padding: 11px 20px; font-size: 0.84rem;
      border-bottom: 1px solid #f5f5f5; vertical-align: top;
    }
    .jc-table tr:last-child td { border-bottom: none; }
    .jc-table tr:hover td { background: #f8faff; }
    .source-stat { background: #dbeafe; color: #1d4ed8; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
    .source-ai { background: #fce7f3; color: #be185d; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
    .source-cert { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
    .cnt-val { font-weight: 600; color: var(--text); }
    .cnt-na { color: #ccc; font-size: 0.78rem; }
    .reason-text { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
    .jc-summary { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px; }
    .jc-summary strong { color: var(--text); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <h1>🎯 NaBi AI 技能推薦系統</h1>
    <p>AI 技能描述推薦課程 · 職類技能需求分析 · 資料更新：2025-03-30</p>
  </div>
</header>

<div class="main-tabs">
  <button class="main-tab active" onclick="switchTab('course')">📚 技能課程推薦</button>
  <button class="main-tab" onclick="switchTab('jobcat')">🏢 職類技能需求</button>
</div>

<!-- TAB 1 -->
<div class="tab-content active" id="tab-course">
  <div class="filter-bar">
    <span class="filter-label">篩選類型：</span>
    <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">全部（47）</button>
    <button class="filter-btn" id="btn-技能" onclick="setFilter('技能')">技能（32）</button>
    <button class="filter-btn" id="btn-工具" onclick="setFilter('工具')">工具（13）</button>
    <button class="filter-btn" id="btn-證照" onclick="setFilter('證照')">證照（2）</button>
    <div class="sort-group">
      <span class="filter-label">排序：</span>
      <select class="sort-select" id="sortSelect" onchange="setSort(this.value)">
        <option value="cnt-desc" selected>提及數 高 → 低</option>
        <option value="cnt-asc">提及數 低 → 高</option>
        <option value="name-asc">名稱 A → Z</option>
      </select>
    </div>
  </div>
  <main class="main">
    <div class="page-info">
      <div class="page-info-text" id="pageInfoText"></div>
      <div class="page-info-text" id="totalInfoText"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="pagination-wrap" id="pagination"></div>
  </main>
</div>

<!-- TAB 2 -->
<div class="tab-content" id="tab-jobcat">
  <div class="jc-layout">
    <div class="jc-summary" id="jcSummary"></div>
    <div class="jc-cls3-bar" id="jcCls3Bar"></div>
    <div id="jcContent"></div>
  </div>
</div>

const THRESHOLD = 0.60;
const PAGE_SIZE = 10;

/* TAB SWITCH */
function switchTab(tab) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  if (tab === 'course') {
    document.querySelector('.main-tab:nth-child(1)').classList.add('active');
    document.getElementById('tab-course').classList.add('active');
  } else {
    document.querySelector('.main-tab:nth-child(2)').classList.add('active');
    document.getElementById('tab-jobcat').classList.add('active');
    if (!jcInitialized) initJobcat();
  }
}

/* TAB 1 */
let currentPage = 1;
let currentFilter = 'all';
let currentSort = 'cnt-desc';
let filteredData = [...RAW_DATA];

function sortData(data, sort) {
  const d = [...data];
  if (sort === 'cnt-desc') d.sort((a, b) => (b.cnt_total || 0) - (a.cnt_total || 0));
  else if (sort === 'cnt-asc') d.sort((a, b) => (a.cnt_total || 0) - (b.cnt_total || 0));
  else if (sort === 'name-asc') d.sort((a, b) => a.auth_word.localeCompare(b.auth_word, 'zh-TW'));
  return d;
}

function applyFilterAndSort() {
  let data = currentFilter === 'all' ? [...RAW_DATA] : RAW_DATA.filter(d => d.word_type === currentFilter);
  filteredData = sortData(data, currentSort);
}

function setFilter(type) {
  currentFilter = type;
  currentPage = 1;
  ['all','技能','工具','證照'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    btn.className = 'filter-btn';
  });
  const btn = document.getElementById('btn-' + type);
  if (type === '工具') btn.className = 'filter-btn active-tool';
  else if (type === '證照') btn.className = 'filter-btn active-cert';
  else btn.className = 'filter-btn active';
  applyFilterAndSort();
  render();
}

function setSort(sort) {
  currentSort = sort;
  currentPage = 1;
  applyFilterAndSort();
  render();
}

function getScoreColor(s) { return s >= 0.65 ? '#059669' : s >= 0.55 ? '#d97706' : '#dc2626'; }
function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderCard(item, globalIndex) {
  const courses = (item.courses || []).filter(c => c.PDDSCORE > THRESHOLD);
  const testScore = item.test ? (item.test.PDDSCORE || 0) : 0;
  const isLow = courses.length === 0 && item.word_type !== '技能' && testScore <= THRESHOLD;
  const cardClass = isLow ? 'skill-card low-relevance' : 'skill-card';
  const cnt = item.cnt_total || 0;
  const cntClass = cnt === 0 ? 'cnt-badge cnt-zero' : 'cnt-badge';

  let testHtml = '';
  if (item.test) {
    const ts = item.test.PDDSCORE || 0;
    const tc = getScoreColor(ts);
    testHtml = `
      <div class="test-section ${ts <= THRESHOLD ? 'test-low' : ''}">
        <span class="test-label">測驗</span>
        <div class="test-title">${escHtml(item.test.title)}</div>
        <div class="test-score" style="color:${tc}">${ts.toFixed(3)}</div>
      </div>`;
  }

  let noBannerHtml = '';
  if (isLow) {
    noBannerHtml = `<div class="no-match-banner">⚠️ 無符合閥值（&gt; 0.60）之課程，課程庫目前缺乏對應內容</div>`;
  }

  const allCoursesList = item.courses || [];
  const courseRows = allCoursesList.map((c, i) => {
    const score = c.PDDSCORE || 0;
    const barWidth = Math.min(100, Math.max(0, Math.round((score - 0.5) / 0.3 * 100)));
    const color = getScoreColor(score);
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    const lowClass = score <= THRESHOLD ? 'course-low' : '';
    return `
      <div class="course-row ${lowClass}">
        <div class="course-rank ${rankClass}">${i + 1}</div>
        <div class="course-title">${escHtml(c.title)}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${barWidth}%; background:${color}"></div>
          </div>
          <div class="score-val" style="color:${color}">${score.toFixed(3)}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="${cardClass}">
      <div class="skill-card-header">
        <div class="skill-card-title-row">
          <div class="skill-index">${globalIndex}</div>
          <div class="skill-name">${escHtml(item.auth_word)}</div>
          <span class="${cntClass}">提及數 ${cnt.toLocaleString()}</span>
          <span class="type-badge type-${item.word_type}">${item.word_type}</span>
        </div>
        <div class="skill-desc">${escHtml(item.description)}</div>
      </div>
      ${testHtml}
      ${noBannerHtml}
      <div class="course-list">${courseRows}</div>
    </div>`;
}

function render() {
  const total = filteredData.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, total);
  const pageItems = filteredData.slice(start, end);
  document.getElementById('pageInfoText').innerHTML = `顯示第 <strong>${start+1}–${end}</strong> 筆，共 <strong>${total}</strong> 筆`;
  document.getElementById('totalInfoText').innerHTML = `第 <strong>${currentPage}</strong> / <strong>${totalPages}</strong> 頁`;
  document.getElementById('grid').innerHTML = pageItems.map((item, i) => renderCard(item, start + i + 1)).join('');
  renderPagination(currentPage, totalPages);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(page, totalPages) {
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = `<button class="pg-btn pg-prev" onclick="goPage(${page-1})" ${page===1?'disabled':''}>← 上一頁</button>`;
  let pages = [];
  if (totalPages <= 7) pages = Array.from({length: totalPages}, (_, i) => i+1);
  else if (page <= 4) pages = [1,2,3,4,5,'...',totalPages];
  else if (page >= totalPages-3) pages = [1,'...',totalPages-4,totalPages-3,totalPages-2,totalPages-1,totalPages];
  else pages = [1,'...',page-1,page,page+1,'...',totalPages];
  pages.forEach(p => {
    if (p === '...') html += `<button class="pg-btn" disabled>…</button>`;
    else html += `<button class="pg-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="pg-btn pg-next" onclick="goPage(${page+1})" ${page===totalPages?'disabled':''}>下一頁 →</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
}

let jcInitialized = false;

function initJobcat() {
  jcInitialized = true;
  const cls3List = [...new Set(JOBCAT_DATA.map(d => d.cls3))];
  document.getElementById('jcCls3Bar').innerHTML = cls3List.map((c, i) => {
    const cnt = JOBCAT_DATA.filter(d => d.cls3 === c).length;
    return `<button class="jc-cls3-btn ${i === 0 ? 'active' : ''}" onclick="selectCls3('${escHtml(c)}')">${escHtml(c)}（${cnt}）</button>`;
  }).join('');
  document.getElementById('jcSummary').innerHTML = `共 <strong>18</strong> 大類、<strong>44</strong> 個職類、<strong>208</strong> 筆技能需求`;
  selectCls3(cls3List[0]);
}

function selectCls3(cls3) {
  document.querySelectorAll('.jc-cls3-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(cls3));
  });
  const items = JOBCAT_DATA.filter(d => d.cls3 === cls3);
  const cls2List = [...new Set(items.map(d => d.cls2))];
  document.getElementById('jcContent').innerHTML = cls2List.map(cls2 => {
    const rows = items.filter(d => d.cls2 === cls2);
    const rowsHtml = rows.map(r => {
      const typeBadge = `<span class="type-badge type-${r.word_type}">${r.word_type}</span>`;
      let sourceBadge = '';
      if (r.source.includes('統計') && r.source.includes('證照')) sourceBadge = `<span class="source-cert">🎓 統計（證照）</span>`;
      else if (r.source.includes('統計')) sourceBadge = `<span class="source-stat">📊 統計</span>`;
      else sourceBadge = `<span class="source-ai">🤖 AI 推薦</span>`;
      const cntHtml = r.cnt !== null ? `<span class="cnt-val">${r.cnt.toLocaleString()}</span>` : `<span class="cnt-na">—</span>`;
      const reasonHtml = r.reason ? `<div class="reason-text">${escHtml(r.reason)}</div>` : '';
      return `<tr>
        <td>${typeBadge} ${escHtml(r.auth_word)}</td>
        <td>${sourceBadge}</td>
        <td style="text-align:right">${cntHtml}</td>
        <td>${reasonHtml}</td>
      </tr>`;
    }).join('');
    return `
      <div class="jc-cls2-group">
        <div class="jc-cls2-header">${escHtml(cls2)}<span class="jc-cls2-count">${rows.length} 項</span></div>
        <table class="jc-table">
          <thead><tr>
            <th style="width:22%">技能 / 工具</th>
            <th style="width:14%">來源</th>
            <th style="width:10%; text-align:right">提及數</th>
            <th>推薦理由</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  }).join('');
}

/* INIT */
applyFilterAndSort();
render();
</script>
